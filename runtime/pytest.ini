[pytest]
testpaths = tests
pythonpath = .
addopts =
    -p no:cacheprovider
    -p no:opik
    -ra
    -m "not integration"
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: live Injective testnet MCP + LLM pipeline (pytest -m integration -s)
