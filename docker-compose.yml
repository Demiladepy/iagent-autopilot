services:
  runtime:
    build:
      context: ./runtime
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./runtime/.env
    environment:
      - SIMULATOR_MODE=true
      - SENTINEL_DB_PATH=/data/sentinel.db
      - KILL_SWITCH=false
      - SENTINEL_ENV=production
      - REQUIRE_API_KEY=true
      - SENTINEL_API_KEY=${SENTINEL_API_KEY:-change-me-in-production}
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - sentinel-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_RUNTIME_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      - RUNTIME_API_URL=http://runtime:8000
      - SENTINEL_API_KEY=${SENTINEL_API_KEY:-change-me-in-production}
    depends_on:
      runtime:
        condition: service_healthy

volumes:
  sentinel-data:
